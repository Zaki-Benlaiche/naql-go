<svg viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="240" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#FF6B00" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="0" y="8" width="64" height="64" rx="16" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="1.2"/>

  <!-- Truck cabin -->
  <path d="M8 52V35c0-2.2 1.8-4 4-4h20v21H8z" fill="white" fill-opacity="0.95"/>
  <!-- Truck cargo -->
  <rect x="32" y="25" width="26" height="27" rx="3" fill="white" fill-opacity="0.95"/>
  <!-- Cargo divider lines -->
  <line x1="45" y1="25" x2="45" y2="52" stroke="#FF6B00" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="32" y1="38.5" x2="58" y2="38.5" stroke="#FF6B00" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Windshield -->
  <rect x="10" y="35" width="16" height="8" rx="1.5" fill="url(#accentGrad)" fill-opacity="0.18"/>
  <!-- Bumper -->
  <rect x="6" y="49" width="54" height="4" rx="2" fill="white" fill-opacity="0.9"/>
  <!-- Wheel left -->
  <circle cx="20" cy="57" r="7" fill="white" fill-opacity="0.95"/>
  <circle cx="20" cy="57" r="4.5" fill="url(#bgGrad)"/>
  <circle cx="20" cy="57" r="1.8" fill="white"/>
  <!-- Wheel right -->
  <circle cx="50" cy="57" r="7" fill="white" fill-opacity="0.95"/>
  <circle cx="50" cy="57" r="4.5" fill="url(#bgGrad)"/>
  <circle cx="50" cy="57" r="1.8" fill="white"/>
  <!-- Speed lines -->
  <line x1="2" y1="36" x2="6" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="0" y1="41" x2="5" y2="41" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="1" y1="46" x2="6" y2="46" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- Arrow (speed symbol) top-right -->
  <path d="M52 18l9 0M61 18l-4-4M61 18l-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
  <!-- Road line -->
  <line x1="6" y1="66" x2="58" y2="66" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.2"/>

  <!-- Text: NaqlGo -->
  <text x="76" y="45" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#0F172A">Naql</text>
  <text x="141" y="45" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#FF6B00">Go</text>

  <!-- Tagline -->
  <text x="77" y="60" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="9.5" letter-spacing="2" fill="#FF6B00" fill-opacity="0.7">نقل وشحن</text>
</svg>
