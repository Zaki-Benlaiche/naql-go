<svg viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="240" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7A20"/>
      <stop offset="100%" stop-color="#C94400"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#A03400" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="8" width="64" height="64" rx="16" fill="none" stroke="white" stroke-opacity="0.14" stroke-width="1.2"/>

  <!-- Location pin (white): scaled to fit 64×64 icon (offset y+8) -->
  <path d="M32,61 L20,45 A16,16 0 1 0 44,45 Z" fill="white" fill-opacity="0.97"/>
  <!-- Cargo box -->
  <rect x="25" y="27" width="20" height="12" rx="2" fill="#0D1F35"/>
  <!-- Cab -->
  <path d="M18,39 L18,31 Q18,28 21,28 L25,28 L25,39 Z" fill="#0D1F35"/>
  <!-- Windshield -->
  <rect x="19.5" y="30" width="4.5" height="4" rx="1" fill="#FF6B00" fill-opacity="0.9"/>
  <!-- Wheel left -->
  <circle cx="22" cy="42" r="3.5" fill="#0D1F35"/>
  <circle cx="22" cy="42" r="1.4" fill="white" fill-opacity="0.85"/>
  <!-- Wheel right -->
  <circle cx="38" cy="42" r="3.5" fill="#0D1F35"/>
  <circle cx="38" cy="42" r="1.4" fill="white" fill-opacity="0.85"/>
  <!-- Speed lines -->
  <line x1="4"  y1="34" x2="9"  y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="3"  y1="39" x2="8"  y2="39" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.48"/>
  <line x1="4"  y1="44" x2="9"  y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.62"/>

  <!-- Text: NaqlGo -->
  <text x="76" y="47" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#0F172A">Naql</text>
  <text x="141" y="47" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#FF6B00">Go</text>

  <!-- Tagline -->
  <text x="77" y="62" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="9.5" letter-spacing="2" fill="#C94400" fill-opacity="0.55">نقل وشحن</text>
</svg>
