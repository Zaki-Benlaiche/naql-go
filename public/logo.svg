<svg viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="240" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7520"/>
      <stop offset="100%" stop-color="#E05000"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#BF4000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Truck body (scaled to fit 64×64 icon, offset y+8) -->
  <path d="M9,50 L9,36 Q9,32 13,32 L23,32 L23,23 Q23,19 27,19 L50,19 Q54,19 54,23 L54,50 Z"
    fill="white" fill-opacity="0.96"/>
  <!-- Wheel left -->
  <circle cx="19" cy="58" r="6.5" fill="white" fill-opacity="0.96"/>
  <circle cx="19" cy="58" r="3.2" fill="#E05000"/>
  <!-- Wheel right -->
  <circle cx="47" cy="58" r="6.5" fill="white" fill-opacity="0.96"/>
  <circle cx="47" cy="58" r="3.2" fill="#E05000"/>

  <!-- Text: NaqlGo -->
  <text x="76" y="47" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#0F172A">Naql</text>
  <text x="141" y="47" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5" fill="#FF6B00">Go</text>

  <!-- Tagline -->
  <text x="77" y="62" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="9.5" letter-spacing="2" fill="#E05000" fill-opacity="0.5">نقل وشحن</text>
</svg>
