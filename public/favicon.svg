<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7520"/>
      <stop offset="100%" stop-color="#E05000"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Truck outline: cab (left, shorter) + cargo (right, taller) -->
  <path
    d="M13,41 L13,29 Q13,25 17,25 L26,25 L26,18 Q26,14 30,14 L48,14 Q52,14 52,18 L52,41"
    fill="none" stroke="white" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom bar -->
  <line x1="13" y1="41" x2="52" y2="41"
    stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Wheel left -->
  <circle cx="20" cy="48" r="6.5" fill="white" fill-opacity="0.96"/>
  <!-- Wheel right -->
  <circle cx="46" cy="48" r="6.5" fill="white" fill-opacity="0.96"/>
</svg>
