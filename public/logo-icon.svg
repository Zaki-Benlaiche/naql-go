<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="1.2"/>
  <!-- Truck cabin -->
  <path d="M6 46V31c0-2 1.6-3.5 3.5-3.5h17V46H6z" fill="white" fill-opacity="0.95"/>
  <!-- Truck cargo -->
  <rect x="26.5" y="22" width="23" height="24" rx="2.5" fill="white" fill-opacity="0.95"/>
  <!-- Cargo lines -->
  <line x1="38" y1="22" x2="38" y2="46" stroke="#FF6B00" stroke-width="0.9" stroke-opacity="0.25"/>
  <line x1="26.5" y1="34" x2="49.5" y2="34" stroke="#FF6B00" stroke-width="0.9" stroke-opacity="0.25"/>
  <!-- Windshield -->
  <rect x="8" y="31" width="14" height="7" rx="1.5" fill="url(#ac)" fill-opacity="0.2"/>
  <!-- Bumper -->
  <rect x="4" y="43" width="48" height="3.5" rx="1.8" fill="white" fill-opacity="0.9"/>
  <!-- Wheel left -->
  <circle cx="17" cy="51" r="6.5" fill="white" fill-opacity="0.95"/>
  <circle cx="17" cy="51" r="4" fill="url(#bg)"/>
  <circle cx="17" cy="51" r="1.6" fill="white"/>
  <!-- Wheel right -->
  <circle cx="45" cy="51" r="6.5" fill="white" fill-opacity="0.95"/>
  <circle cx="45" cy="51" r="4" fill="url(#bg)"/>
  <circle cx="45" cy="51" r="1.6" fill="white"/>
  <!-- Speed lines -->
  <line x1="1" y1="32" x2="4.5" y2="32" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="0" y1="37" x2="4" y2="37" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="1" y1="42" x2="4.5" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- Arrow top-right -->
  <path d="M46 14l8 0M54 14l-3.5-3.5M54 14l-3.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
  <!-- Ground -->
  <line x1="4" y1="59" x2="60" y2="59" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.18"/>
</svg>
