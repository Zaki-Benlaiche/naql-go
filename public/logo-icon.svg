<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7520"/>
      <stop offset="100%" stop-color="#E05000"/>
    </linearGradient>
    <filter id="ds">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#BF4000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)" filter="url(#ds)"/>
  <!-- Cargo box -->
  <path d="M28,18 L48,18 Q51,18 51,21 L51,41 L28,41 Z" fill="white"/>
  <!-- Cab -->
  <path d="M16,28 L28,28 L28,41 L14,41 Q12,41 12,39 L12,32 Q12,28 15,28 Z" fill="white"/>
  <!-- Window -->
