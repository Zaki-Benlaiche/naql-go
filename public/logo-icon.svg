<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF9040"/>
      <stop offset="45%"  stop-color="#FF6500"/>
      <stop offset="100%" stop-color="#C94400"/>
    </linearGradient>
    <linearGradient id="igloss" x1="10%" y1="0%" x2="55%" y2="75%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iglass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="irim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#B83A00"/>
    </linearGradient>
    <filter id="ids" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#B83A00" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect x="6" y="6" width="188" height="188" rx="52" fill="url(#ibg)" filter="url(#ids)"/>
  <rect x="6" y="6" width="188" height="188" rx="52" fill="url(#igloss)"/>
  <rect x="6" y="6" width="188" height="188" rx="52" fill="none" stroke="white" stroke-opacity="0.13" stroke-width="1.5"/>

  <!-- Cargo container -->
  <rect x="82" y="48" width="90" height="72" rx="11" fill="white" fill-opacity="0.96"/>
  <line x1="127" y1="48"  x2="127" y2="120" stroke="#FF6500" stroke-width="1.5" stroke-opacity="0.11"/>
  <line x1="82"  y1="84"  x2="172" y2="84"  stroke="#FF6500" stroke-width="1.5" stroke-opacity="0.11"/>

  <!-- Cab body -->
  <path d="M26 120 L26 76 Q26 66 36 66 L82 66 L82 120 Z" fill="white" fill-opacity="0.96"/>

  <!-- Windshield -->
  <rect x="32" y="72" width="44" height="27" rx="7" fill="url(#iglass)" fill-opacity="0.28"/>
  <line x1="36" y1="78" x2="45" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Headlight -->
  <rect x="19" y="84" width="9" height="16" rx="4.5" fill="white" fill-opacity="0.92"/>
  <rect x="21" y="86" width="5" height="10" rx="2.5" fill="#FFF0C0" fill-opacity="0.5"/>

  <!-- Bumper -->
  <rect x="17" y="116" width="162" height="10" rx="5" fill="white" fill-opacity="0.93"/>

  <!-- Front wheel -->
  <circle cx="57"  cy="140" r="20" fill="white" fill-opacity="0.95"/>
  <circle cx="57"  cy="140" r="13" fill="url(#irim)"/>
  <circle cx="57"  cy="140" r="5"  fill="white" fill-opacity="0.92"/>
  <line x1="57" y1="128" x2="57" y2="133" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="57" y1="147" x2="57" y2="152" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="45"  y1="140" x2="50"  y2="140" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="64"  y1="140" x2="69"  y2="140" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>

  <!-- Rear wheel -->
  <circle cx="143" cy="140" r="20" fill="white" fill-opacity="0.95"/>
  <circle cx="143" cy="140" r="13" fill="url(#irim)"/>
  <circle cx="143" cy="140" r="5"  fill="white" fill-opacity="0.92"/>
  <line x1="143" y1="128" x2="143" y2="133" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="143" y1="147" x2="143" y2="152" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="131" y1="140" x2="136" y2="140" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
  <line x1="150" y1="140" x2="155" y2="140" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>

  <!-- Speed lines -->
  <line x1="6"  y1="80"  x2="20" y2="80"  stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.62"/>
  <line x1="3"  y1="92"  x2="17" y2="92"  stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.42"/>
  <line x1="6"  y1="104" x2="19" y2="104" stroke="white" stroke-width="3"   stroke-linecap="round" stroke-opacity="0.52"/>

  <!-- Forward arrows -->
  <line x1="150" y1="30" x2="170" y2="30" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.88"/>
  <path d="M162 22 L170 30 L162 38" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.88"/>
  <line x1="142" y1="42" x2="158" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.45"/>
  <path d="M152 35 L158 42 L152 49" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.45"/>

  <!-- Road -->
  <rect x="28" y="162" width="144" height="3" rx="1.5" fill="white" fill-opacity="0.1"/>
  <rect x="50"  y="167" width="14" height="2" rx="1" fill="white" fill-opacity="0.07"/>
  <rect x="78"  y="167" width="14" height="2" rx="1" fill="white" fill-opacity="0.07"/>
  <rect x="106" y="167" width="14" height="2" rx="1" fill="white" fill-opacity="0.07"/>
  <rect x="134" y="167" width="14" height="2" rx="1" fill="white" fill-opacity="0.07"/>
</svg>
