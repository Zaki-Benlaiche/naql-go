  <!-- Cargo divider -->
  <rect x="38" y="20" width="0.8" height="20" fill="#E05000" fill-opacity="0.2"/>
  <!-- Wheels -->
  <circle cx="20" cy="45" r="5.5" fill="white"/>
  <circle cx="20" cy="45" r="2"   fill="url(#bg)"/>
  <circle cx="44" cy="45" r="5.5" fill="white"/>
  <circle cx="44" cy="45" r="2"   fill="url(#bg)"/>
</svg>
