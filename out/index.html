<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>NaqlGo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0A1628;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .logo {
    width: 96px; height: 96px; border-radius: 24px;
    background: linear-gradient(135deg, #FF6B00, #E65100);
    box-shadow: 0 12px 40px rgba(255,107,0,0.35);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    font-size: 44px; font-weight: 900;
  }
  h1 { margin: 0 0 8px; font-size: 28px; font-weight: 800; }
  p  { margin: 0 0 24px; color: #94A3B8; font-size: 15px; line-height: 1.6; max-width: 320px; }
  .spinner {
    width: 40px; height: 40px; margin-top: 16px;
    border: 3px solid rgba(255,107,0,0.15);
    border-top-color: #FF6B00;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  button {
    margin-top: 16px;
    background: linear-gradient(135deg, #FF6B00, #E65100);
    border: 0; color: #fff; font-weight: 700; font-size: 15px;
    padding: 14px 28px; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,0,0.35);
  }
  button:active { transform: scale(0.97); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">N</div>
  <h1>NaqlGo</h1>
  <p id="msg">جارٍ تحميل التطبيق...</p>
  <div class="spinner" id="spinner"></div>
  <button id="retry" class="hidden" onclick="go()">إعادة المحاولة</button>
</div>

<script>
  var APP_URL = "https://naql-go.vercel.app";

  function go() {
    document.getElementById("msg").textContent = "جارٍ تحميل التطبيق...";
    document.getElementById("spinner").classList.remove("hidden");
    document.getElementById("retry").classList.add("hidden");
    location.replace(APP_URL);
  }

  function fail() {
    document.getElementById("msg").textContent =
      "تعذّر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.";
    document.getElementById("spinner").classList.add("hidden");
    document.getElementById("retry").classList.remove("hidden");
  }

  // Try to navigate to the app. If the device is offline, show retry.
  if (navigator.onLine === false) {
    fail();
  } else {
    setTimeout(go, 600);
    setTimeout(function () {
      // If still on this page after 10s, show retry button
      if (document.getElementById("retry")) {
        document.getElementById("retry").classList.remove("hidden");
      }
    }, 10000);
  }

  window.addEventListener("offline", fail);
</script>
</body>
</html>
